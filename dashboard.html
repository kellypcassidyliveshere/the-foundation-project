<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Foundation Project - Member Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b2265; /* Royal Blue */
            color: #ffffff; 
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            letter-spacing: 1px;
            margin: 15px 0 20px 0;
            text-transform: uppercase;
            font-size: 1.6rem;
        }

        /* Diamond Profile Container */
        .profile-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .diamond-box {
            width: 90px;
            height: 90px;
            background: #4a154b; /* Purple */
            border: 3px solid #ffd700; /* Gold */
            transform: rotate(45deg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .diamond-content {
            transform: rotate(-45deg);
            width: 140%;
            height: 140%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .upload-btn {
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            border: 1px solid #ffd700;
        }

        .upload-btn input[type="file"] {
            display: none;
        }

        /* Strict 2x2 Layout Container for Mobile & Desktop */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* FORCES 2 COLUMNS ALWAYS */
            gap: 12px;
            max-width: 600px;
            width: 100%;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .portal-box {
            background-color: #0b2265;
            border: 3px solid #4a154b; 
            outline: 2px solid #ffd700;
            outline-offset: -5px;
            border-radius: 4px;
            padding: 15px 8px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            text-decoration: none;
            color: #ffffff;
        }

        /* Forces the Facebook Box to take up the full horizontal span below the 2x2 */
        .full-width {
            grid-column: span 2;
            min-height: 75px;
            margin-top: 5px;
        }

        .portal-box h2 {
            margin: 0 0 6px 0;
            font-size: 0.95rem; /* Balanced for 2 columns on mobile screens */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .portal-box p {
            margin: 0;
            font-size: 0.75rem;
            opacity: 0.85;
            line-height: 1.3;
        }

        /* Exit Navigation at the Bottom */
        .footer-nav {
            margin: 30px 0;
            text-align: center;
            width: 100%;
        }

        .home-btn {
            display: inline-block;
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Member Portal</h1>

    <div class="profile-container">
        <div class="diamond-box">
            <div class="diamond-content">
                <div>EDIT</div>
                <label class="upload-btn">
                    Upload
                    <input type="file" accept="image/*">
                </label>
            </div>
        </div>
    </div>

    <div class="grid-container">
        
        <div class="portal-box" onclick="location.href='#'">
            <h2>Learning Pathway</h2>
            <p>Modules & weekly check-ins.</p>
        </div>

        <div class="portal-box" onclick="location.href='#'">
            <h2>Cyber Lounge & Juice Bar</h2>
            <p>Signature drinks & perks.</p>
        </div>

        <div class="portal-box" onclick="location.href='#'">
            <h2>Infinity Private</h2>
            <p>Updates & founder logs.</p>
        </div>

        <div class="portal-box" onclick="location.href='#'">
            <h2>Points & Rewards</h2>
            <p>Tokens & exclusive offers.</p>
        </div>

        <a href="https://www.facebook.com/share/1U9uayLnqz/" target="_blank" class="portal-box full-width">
            <h2>JOIN OUR FACEBOOK</h2>
            <p>Connect with our private community peer network.</p>
        </a>

    </div>

    <div class="footer-nav">
        <a href="index.html" class="home-btn">Back To Main</a>
    </div>

</body>
</html>
